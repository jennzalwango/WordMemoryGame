<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Memory Word Game</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./home.css">
</head>

<body>
    <nav class="navbar">
        <li>
            Memory Word Game
        </li>
        <li>
            User
        </li>
    </nav>
    <!--the side bar for game categories-->
    <div class="sideBar">
        <a href="home.html">Home</a>
        <a href="Instructions.html">Instructions</a>
        <a href="score.html">Score</a>
        <a href="about.html">About</a>
        <a href="register.html">Admin Panel</a>
    </div>
    <!--the content-->
    <section>

        <div class="cardContainer">
            <form id="signUpForm">
                <h3 style="text-align: center;">Sign Up</h3>
                <hr>
                <div></div>
                <input class="answerForm" type="text" name="username" placeholder="Username" id="username"><br><br>
                <input class="answerForm" type="password" name="password" id="password" placeholder="Password"><br><br>
                <p id="message"></p>

                <div id="lower_login">
                    <br>
                    <button type="submit">Register</button>
                    <P>You have an account? <a href="./login.html">Login</a></P>
                </div>
            </form>
        </div>

    </section>

    <footer class="footer">
        <p> &copy; Copy Right 2026</p>
    </footer>

    <script>
        // signup the user
        document.getElementById('signUpForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            //user fethc to register the user
            fetch("./api/admin/register.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                //the body
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log("RAW RESPONSE:", data);
                document.getElementById("message").innerText = data.message;
                if (data.message === "Registration successful") {
                    window.location.href = "login.html";
                }
            })
            .catch(
                err => console.error(err)
            )


        });



    </script>
</body>

</html>
