<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Memory Word Game</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./home.css">
</head>

<body>
    <nav class="navbar">
        <li>
            Memory Word Game
        </li>
        <li>
            User
        </li>
    </nav>
    <div class="sideBar">
        <a href="home.html">Home</a>
        <a href="Instructions.html">Instructions</a>
        <a href="score.html">Score</a>
        <a href="about.html">About</a>
        <a href="admin.html">Admin Panel</a>
    </div>
    <!--the content-->
    <section>
        <div class="cardContainer">
            <form id="form">
                <h3 style="text-align: center;" >Login</h3>
                <hr>
                <input class="answerForm"  type="text" placeholder="Username" id="username"> <br><br>
                <input  class="answerForm" type="password" placeholder="Password" id="password"><br><br>
                <p id="message"></p>
                <div id="lower_login">
                    <br>

                    <button onclick="loginUser(); return false;">Login</button>
                    <P>Don't have an account? <a href="./register.html">Signup </a></P>
            </form>

        </div>

    </section>

    <footer class="footer">
        <p> &copy; Copy Right 2026</p>
    </footer>

    <script>
        function loginUser(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            //use the fetch api call
            fetch("./api/admin/login.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                // the body is converted in a JSON string
                body: JSON.stringify({
                    username:username,
                    password: password
                })
            })
            .then(res => res.json()) //the response in a json format, and the data
            .then(data =>{
                document.getElementById("message").innerText = data.message;
                if(data.message === "Login successful"){
                    //redirect the suer to the admin page
                    window.location.href="admin.html"
                }
            })
            .catch(err => console.error(err));
        }
    </script>
</body>

</html>
