<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Memory Word Game</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./home.css">
</head>

<body>
    <nav class="navbar">
        <li>
            Memory Word Game
        </li>
        <li>
            User
        </li>
    </nav>
    <!--the side bar for game categories-->
    <div class="sideBar">

        <a href="home.html">Home</a>
        <a href="Instructions.html">Instructions</a>
        <a href="score.html">Score</a>
        <a href="about.html">About</a>
    </div>
    <!--the form content-->
    <section>
        <!--the game cards modal-->
        <!--can add more content needed-->
        <div class="cardContainer cardContentcontainer">

            <!--On submitting this form, you go to score paage, of php. action="/score_page.php"-->
            <form id="wordForm">
                <div id="inputContainer" class="answerForm"></div>
                <button type="submit" id="submitButton">Submit</button>
            </form>
        </div>
        <div id="resultsScreen" style="display: none; text-align: center; margin-top: 20px;">
            <h2 id="roundTitle"></h2>
            <p id="resultText"></p>

            <button id="continueBtn" class="continueButton">Continue</button>
            <button id="endBtn" class="endGamebutton">End Game</button>

        </div>

    </section>

    <footer class="footer">
        <p> &copy; Copy Right 2026</p>
    </footer>

    <script>
        document.getElementById("wordForm").addEventListener("submit", userSubmittedWords)

        function userSubmittedWords(e) {
            e.preventDefault();
            // get the current session of the player
            let showedWords = JSON.parse(sessionStorage.getItem("words"));


            let userInputs = document.querySelectorAll(".wordFormInput");

            //get the  count correct word the player gets right
            let correctWordCount = 0;

            //looop each input, and increment score
            userInputs.forEach(input => {
                if (showedWords.includes(input.value.trim())) {
                    correctWordCount++;
                }
            });

            //get the total score of the player for all rounds
            let totalScore = parseInt(sessionStorage.getItem("score")) || 0;
            //add the round's score
            totalScore += correctWordCount;
            //save the updated the total score
            sessionStorage.setItem("score", totalScore);

            //define round, and use sessionStorage to store details
            let round = parseInt(sessionStorage.getItem("round")) || 1;

            // hide the form while user submitted
            document.getElementById("wordForm").style.display = "none";

            //shows the players the results
            document.getElementById("resultsScreen").style.display = "block";

            //set texts

            document.getElementById("roundTitle").innerText = `Round ${round} Result`;
            document.getElementById("resultText").innerText =
                `You got ${correctWordCount} / ${showedWords.length} correct`;


            //buttons
            const continueBtn = document.getElementById("continueBtn");
            const endBtn = document.getElementById("endBtn")

            // when all the words entered are correct, next round play
            if (correctWordCount === showedWords.length) {
                continueBtn.style.display = "inline-block";

                continueBtn.onclick = function () {
                    round++;
                    sessionStorage.setItem("round", round);
                    window.location.href = "game.html";

                };
            } else {
                continueBtn.style.display = "none";

            }

            //end the game
            endBtn.onclick = function () {

                endGame(totalScore);
            };
        }

        document.addEventListener("DOMContentLoaded", () => {
            let showedWords = JSON.parse(sessionStorage.getItem("words")) || [];
            let containerField = document.getElementById('inputContainer');
            //loops through each showed words
            showedWords.forEach((word, index) => {
                //create input element for user answers
                let input = document.createElement('input');
                input.type = "text";
                input.placeholder = "Enter Word.." + (index + 1); // define placeholder, get the index and add 1
                input.classList.add('wordFormInput') //create the class word Form Input

                //user apendChild to add child elements to the container 
                containerField.appendChild(input);
                containerField.appendChild(document.createElement("br"));
                containerField.appendChild(document.createElement("br"));

            });
        });

        // add this option to end the game, if user wants

        function endGame(finalScore) {

            const game_id = sessionStorage.getItem("game_id")
            //use Fetch to save the score of the user to php. 
            fetch("./api/saveUserScore.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    score: finalScore,
                    game_id: game_id
                })
            })
                .then(res => res.text()) // 👈 read raw response first
                .then(text => {
                    console.log("RAW RESPONSE:", text); // 👈 DEBUG

                    if (!text) {
                        throw new Error("Empty response from server");
                    }

                    let data = JSON.parse(text); // now parse safely

                    console.log(data.message);
                    window.location.href = "score.html";
                })
                .catch(err => {
                    console.error("ERROR:", err);
                    /*.then(res => res.json())
                    .then(data => {
                        // show and load score page
                        console.log(data.message);
                        window.location.href = "score.html";*/
                });
        }


    </script>
</body>

</html>
